{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<div class="card shadow-lg">

<div class="card-header bg-primary text-white">

<h3>Edit Profile</h3>

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button type="submit" class="btn btn-success">
Save Changes
</button>

<a href="{% url 'profile' %}" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</div>

{% endblock %}
